<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&family=Pacifico&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }
  body { font-family: 'Poppins', sans-serif; background: #030712; color: white; }

  .hero {
    position: relative;
    width: 100%;
    height: 680px;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(30, 64, 175, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(14, 45, 120, 0.15) 0%, transparent 40%),
      linear-gradient(180deg, #000000 0%, #020617 30%, #0a1628 60%, #030712 100%);
  }

  .grid-overlay {
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  .stars { position: absolute; inset: 0; z-index: 1; }
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle ease-in-out infinite; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(0.8); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }

  .road-container { position: absolute; inset: 0; z-index: 2; }
  .road-svg { width: 100%; height: 100%; display: block; }

  .main-road {
    fill: none; stroke: url(#roadGradient); stroke-width: 36;
    stroke-linecap: round; stroke-linejoin: round;
    filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.2));
  }
  .road-glow { fill: none; stroke: url(#roadGradient); stroke-width: 52; stroke-linecap: round; opacity: 0.08; filter: blur(12px); }
  .road-center-line {
    fill: none; stroke: rgba(255, 255, 255, 0.2); stroke-width: 2;
    stroke-dasharray: 15 12; stroke-linecap: round;
    animation: dashMove 1.5s linear infinite;
  }
  @keyframes dashMove { to { stroke-dashoffset: -27; } }

  .branch-road {
    fill: none; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round;
    opacity: 0; animation: branchAppear 1s ease forwards;
  }
  .branch-glow { fill: none; stroke-width: 28; stroke-linecap: round; opacity: 0.08; filter: blur(8px); }
  .branch-center {
    fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 1.5;
    stroke-dasharray: 8 8; stroke-linecap: round;
    animation: dashMove 1.5s linear infinite;
  }
  @keyframes branchAppear {
    from { opacity: 0; stroke-dashoffset: 600; }
    to { opacity: 1; stroke-dashoffset: 0; }
  }
  .branch-1 { stroke: #3b82f6; animation-delay: 0.5s; }
  .branch-2 { stroke: #60a5fa; animation-delay: 0.8s; }
  .branch-3 { stroke: #2563eb; animation-delay: 1.1s; }
  .branch-4 { stroke: #93c5fd; animation-delay: 1.4s; }
  .branch-5 { stroke: #1d4ed8; animation-delay: 1.7s; }

  .fork-point {
    fill: white;
    filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.8)) drop-shadow(0 0 50px rgba(59, 130, 246, 0.4));
    animation: forkPulse 2s ease-in-out infinite;
  }
  @keyframes forkPulse {
    0%, 100% { r: 8; opacity: 0.9; }
    50% { r: 12; opacity: 1; }
  }
  .traveling-light { fill: white; filter: drop-shadow(0 0 8px rgba(147, 197, 253, 0.9)); }

  /* ===== 목적지 아이콘 (SVG foreignObject 안 — 가지 끝에 고정) ===== */
  .destination {
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    width: 130px;
    opacity: 0; animation: destAppear 0.8s ease forwards;
  }
  .dest-icon {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.45rem; position: relative;
    border: 1.5px solid rgba(59, 130, 246, 0.35);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }
  .destination:hover .dest-icon {
    transform: scale(1.12);
    border-color: rgba(96, 165, 250, 0.9);
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.45);
  }
  .dest-icon.blue-1 { background: linear-gradient(135deg, #1e3a5f, #1e40af); }
  .dest-icon.blue-2 { background: linear-gradient(135deg, #172554, #1d4ed8); }
  .dest-icon.blue-3 { background: linear-gradient(135deg, #0c1e3a, #2563eb); }
  .dest-icon.blue-4 { background: linear-gradient(135deg, #1a2744, #3b82f6); }
  .dest-icon.blue-5 { background: linear-gradient(135deg, #0f172a, #1e40af); }
  .dest-label {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 2px;
    color: rgba(203, 213, 225, 0.85); text-shadow: 0 2px 10px rgba(0,0,0,0.8); white-space: nowrap;
    transition: color 0.3s ease;
  }
  .destination:hover .dest-label { color: rgba(147, 197, 253, 1); }
  @keyframes destAppear {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .dest-ring {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1.5px solid rgba(59, 130, 246, 0.4); opacity: 0;
    animation: ringPulse 3s ease-in-out infinite;
  }
  .ring-1 { animation-delay: 0s; }
  .ring-2 { animation-delay: 0.6s; }
  .ring-3 { animation-delay: 1.2s; }
  .ring-4 { animation-delay: 1.8s; }
  .ring-5 { animation-delay: 2.4s; }
  @keyframes ringPulse {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1); opacity: 0; }
  }

  /* ===== 중앙 로고 ===== */
  .content-center {
    position: absolute; left: 50%; top: 52%;
    transform: translate(-50%, -50%);
    z-index: 15; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    pointer-events: none; overflow: visible;
  }
  .logo-container { position: relative; animation: logoFloat 5s ease-in-out infinite; overflow: visible; }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .logo-my {
    font-weight: 400; font-size: clamp(2.4rem, 6vw, 3.6rem); color: #ffffff;
    letter-spacing: 8px; line-height: 1.5; padding: 0.1em 0 0.3em; overflow: visible;
    text-shadow: 0 2px 14px rgba(0,0,0,0.55), 0 0 26px rgba(147,197,253,0.45);
  }
  .logo-way {
    font-family: 'Pacifico', cursive; font-size: clamp(3.8rem, 11vw, 6.2rem);
    background: linear-gradient(135deg, #ffffff 0%, #dbeafe 30%, #93c5fd 55%, #bfdbfe 80%, #ffffff 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: gradientShift 6s ease-in-out infinite; line-height: 1.15; padding-bottom: 0.08em; overflow: visible;
    filter: drop-shadow(0 3px 10px rgba(0,0,0,0.6)) drop-shadow(0 0 38px rgba(59, 130, 246, 0.6));
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .logo-line { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, #93c5fd, transparent); border-radius: 2px; margin: 0 auto; }
  .tagline {
    font-size: clamp(0.95rem, 2.4vw, 1.25rem); font-weight: 500; color: rgba(255,255,255,0.85);
    letter-spacing: 6px; text-shadow: 0 2px 12px rgba(0,0,0,0.65);
  }
  .tagline .highlight { color: #bfdbfe; font-weight: 700; }

  .path-particles { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  .path-particle { position: absolute; border-radius: 50%; animation: particleRise linear infinite; }
  @keyframes particleRise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    20% { opacity: 0.6; }
    100% { transform: translateY(-120px) scale(0); opacity: 0; }
  }

  .hero-footer {
    position: absolute; bottom: 26px; width: 100%; z-index: 15;
    display: flex; justify-content: center; gap: 40px;
    animation: fadeIn 1s ease 2.5s both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .footer-stat { text-align: center; }
  .footer-stat .num { font-size: 1.3rem; font-weight: 700; color: #93c5fd; }
  .footer-stat .label { font-size: 0.58rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1.5px; }
  .footer-divider { width: 1px; height: 34px; background: linear-gradient(180deg, transparent, rgba(59,130,246,0.3), transparent); align-self: center; }
</style>
</head>
<body>
<section class="hero">
  <div class="grid-overlay"></div>
  <div class="stars" id="starsContainer"></div>

  <div class="road-container">
    <svg class="road-svg" viewBox="0 0 1440 760" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="roadGradient" x1="0%" y1="100%" x2="50%" y2="0%">
          <stop offset="0%" style="stop-color: #0a1628; stop-opacity: 0.9" />
          <stop offset="50%" style="stop-color: #1e3a5f; stop-opacity: 0.85" />
          <stop offset="100%" style="stop-color: #1e40af; stop-opacity: 0.6" />
        </linearGradient>
        <linearGradient id="b1" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0.25"/></linearGradient>
        <linearGradient id="b2" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#60a5fa" stop-opacity="0.25"/></linearGradient>
        <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0.25"/></linearGradient>
        <linearGradient id="b4" x1="100%" y1="0%" x2="0%" y2="0%"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.25"/></linearGradient>
        <linearGradient id="b5" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.25"/></linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="4" result="cb"/><feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- 메인 도로 -->
      <path class="road-glow" d="M 720 780 Q 700 620 720 470" />
      <path class="main-road" d="M 720 780 Q 700 620 720 470" />
      <path class="road-center-line" d="M 720 780 Q 700 620 720 470" />

      <!-- 가지: 비용(중앙 위) -->
      <path class="branch-glow" stroke="#93c5fd" d="M 720 470 Q 718 300 720 95" />
      <path class="branch-road branch-4" stroke="url(#b1)" d="M 720 470 Q 718 300 720 95" />
      <path class="branch-center" d="M 720 470 Q 718 300 720 95" />

      <!-- 가지: 취업(왼쪽 위) -->
      <path class="branch-glow" stroke="#3b82f6" d="M 720 470 Q 560 360 300 150" />
      <path class="branch-road branch-1" stroke="url(#b1)" d="M 720 470 Q 560 360 300 150" />
      <path class="branch-center" d="M 720 470 Q 560 360 300 150" />

      <!-- 가지: 스펙(오른쪽 위) -->
      <path class="branch-glow" stroke="#60a5fa" d="M 720 470 Q 880 360 1140 150" />
      <path class="branch-road branch-2" stroke="url(#b2)" d="M 720 470 Q 880 360 1140 150" />
      <path class="branch-center" d="M 720 470 Q 880 360 1140 150" />

      <!-- 가지: 스케줄(왼쪽) -->
      <path class="branch-glow" stroke="#1d4ed8" d="M 720 470 Q 430 430 110 360" />
      <path class="branch-road branch-5" stroke="url(#b4)" d="M 720 470 Q 430 430 110 360" />
      <path class="branch-center" d="M 720 470 Q 430 430 110 360" />

      <!-- 가지: 로드맵(오른쪽) -->
      <path class="branch-glow" stroke="#2563eb" d="M 720 470 Q 1010 430 1330 360" />
      <path class="branch-road branch-3" stroke="url(#b3)" d="M 720 470 Q 1010 430 1330 360" />
      <path class="branch-center" d="M 720 470 Q 1010 430 1330 360" />

      <!-- 분기점 -->
      <circle class="fork-point" cx="720" cy="470" r="8" filter="url(#glow)" />
      <circle cx="720" cy="470" r="18" fill="none" stroke="rgba(59,130,246,0.25)" stroke-width="1">
        <animate attributeName="r" values="18;36;18" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite" />
      </circle>

      <!-- 이동하는 빛 -->
      <path id="wp1" d="M 720 780 Q 700 620 720 470 Q 560 360 300 150" fill="none" />
      <path id="wp2" d="M 720 780 Q 700 620 720 470 Q 880 360 1140 150" fill="none" />
      <path id="wp3" d="M 720 780 Q 700 620 720 470 Q 718 300 720 95" fill="none" />
      <circle class="traveling-light" r="4" opacity="0.9"><animateMotion dur="7s" repeatCount="indefinite"><mpath href="#wp1" /></animateMotion></circle>
      <circle class="traveling-light" r="3" opacity="0.6"><animateMotion dur="9s" repeatCount="indefinite" begin="2s"><mpath href="#wp2" /></animateMotion></circle>
      <circle class="traveling-light" r="3.5" opacity="0.7"><animateMotion dur="8s" repeatCount="indefinite" begin="4s"><mpath href="#wp3" /></animateMotion></circle>

      <!-- 목적지 아이콘 (가지 끝에 정확히 고정) -->
      <foreignObject x="655" y="68" width="130" height="118" style="overflow:visible;">
        <div xmlns="http://www.w3.org/1999/xhtml" class="destination" style="animation-delay:1.5s;">
          <div class="dest-icon blue-4"><div class="dest-ring ring-4"></div>💰</div>
          <span class="dest-label">비용</span>
        </div>
      </foreignObject>
      <foreignObject x="235" y="123" width="130" height="118" style="overflow:visible;">
        <div xmlns="http://www.w3.org/1999/xhtml" class="destination" style="animation-delay:0.8s;">
          <div class="dest-icon blue-1"><div class="dest-ring ring-1"></div>💼</div>
          <span class="dest-label">취업</span>
        </div>
      </foreignObject>
      <foreignObject x="1075" y="123" width="130" height="118" style="overflow:visible;">
        <div xmlns="http://www.w3.org/1999/xhtml" class="destination" style="animation-delay:1.1s;">
          <div class="dest-icon blue-2"><div class="dest-ring ring-2"></div>🎓</div>
          <span class="dest-label">스펙</span>
        </div>
      </foreignObject>
      <foreignObject x="45" y="333" width="130" height="118" style="overflow:visible;">
        <div xmlns="http://www.w3.org/1999/xhtml" class="destination" style="animation-delay:2s;">
          <div class="dest-icon blue-5"><div class="dest-ring ring-5"></div>📅</div>
          <span class="dest-label">스케줄</span>
        </div>
      </foreignObject>
      <foreignObject x="1265" y="333" width="130" height="118" style="overflow:visible;">
        <div xmlns="http://www.w3.org/1999/xhtml" class="destination" style="animation-delay:1.7s;">
          <div class="dest-icon blue-3"><div class="dest-ring ring-3"></div>🚀</div>
          <span class="dest-label">로드맵</span>
        </div>
      </foreignObject>
    </svg>
  </div>

  <div class="path-particles" id="pathParticles"></div>

  <div class="content-center">
    <div class="logo-container">
      <div class="logo-my">my</div>
      <div class="logo-way">Way</div>
    </div>
    <div class="logo-line"></div>
    <div class="tagline">나의 길 &middot; <span class="highlight">나의 선택</span></div>
  </div>

  <div class="hero-footer">
    <div class="footer-stat"><div class="num">5,000+</div><div class="label">대학생</div></div>
    <div class="footer-divider"></div>
    <div class="footer-stat"><div class="num">∞</div><div class="label">진로</div></div>
    <div class="footer-divider"></div>
    <div class="footer-stat"><div class="num">AI</div><div class="label">맞춤 분석</div></div>
  </div>
</section>

<script>
  const starsContainer = document.getElementById('starsContainer');
  for (let i = 0; i < 130; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    const size = Math.random() * 2 + 0.5;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.style.background = Math.random() > 0.7 ? '#93c5fd' : 'white';
    starsContainer.appendChild(star);
  }

  const particlesContainer = document.getElementById('pathParticles');
  const colors = ['#3b82f6', '#60a5fa', '#93c5fd', '#ffffff', '#1d4ed8', '#bfdbfe'];
  function createPathParticle() {
    const p = document.createElement('div');
    p.classList.add('path-particle');
    const size = Math.random() * 4 + 1.5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = (47 + Math.random() * 6) + '%';
    p.style.top = (55 + Math.random() * 10) + '%';
    p.style.animationDuration = (Math.random() * 3 + 2) + 's';
    particlesContainer.appendChild(p);
    setTimeout(() => p.remove(), 5000);
  }
  setInterval(createPathParticle, 260);

  // 별만 살짝 패럴럭스 (아이콘은 가지 끝에 고정 유지)
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 14;
    const y = (e.clientY / window.innerHeight - 0.5) * 14;
    starsContainer.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
  });
</script>
</body>
</html>
